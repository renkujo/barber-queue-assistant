services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      BARBER_ADMIN_PASSCODE: ${BARBER_ADMIN_PASSCODE}
      BARBER_ADMIN_SESSION_SECRET: ${BARBER_ADMIN_SESSION_SECRET}
      RATE_LIMIT_HASH_SECRET: ${RATE_LIMIT_HASH_SECRET}
      NEXT_PUBLIC_PRIVACY_CONTACT: ${NEXT_PUBLIC_PRIVACY_CONTACT}
      CUSTOMER_DATA_RETENTION_DAYS: ${CUSTOMER_DATA_RETENTION_DAYS:-180}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      NEXT_PUBLIC_LINE_LIFF_ID: ${NEXT_PUBLIC_LINE_LIFF_ID:-}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-barber_queue_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-barber_queue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - barber_queue_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-barber_queue_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-barber_queue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      R2_BACKUP_ENABLED: ${R2_BACKUP_ENABLED:-false}
      R2_BACKUP_INTERVAL_HOURS: ${R2_BACKUP_INTERVAL_HOURS:-24}
      R2_BACKUP_RETRY_MINUTES: ${R2_BACKUP_RETRY_MINUTES:-15}
      R2_BACKUP_MAX_ATTEMPTS: ${R2_BACKUP_MAX_ATTEMPTS:-3}
      R2_PROVIDER: ${R2_PROVIDER:-Cloudflare}
      R2_REGION: ${R2_REGION:-auto}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PREFIX: ${R2_PREFIX:-barber-queue-assistant/postgres}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/postgres-r2-backup-healthcheck"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 35m

volumes:
  barber_queue_postgres_data:
